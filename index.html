<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asadul Islam Hasan | Digital Card</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050811;
            --card-bg: rgba(11, 17, 32, 0.6);
            --accent-copper: #d9966c;
            --accent-gold: #f59e0b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 🌌 ব্যাকগ্রাউন্ডের মডার্ন নিয়ন লাইটিং */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 150, 108, 0.2), transparent 70%);
            z-index: -1;
        }
        body::before { top: 5%; left: 10%; }
        body::after { bottom: 5%; right: 10%; }

        /* 💻 PC এবং 📱 MOBILE রেসপন্সিভ কন্টেইনার */
        .container {
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🖥️ PC সাইজ */
        @media (min-width: 481px) {
            .container {
                max-width: 440px;
                border-radius: 32px;
                padding: 55px 35px;
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                            inset 0 1px 2px rgba(255, 255, 255, 0.15);
                border: 1px solid rgba(217, 150, 108, 0.25);
            }
            .container:hover {
                border-color: rgba(217, 150, 108, 0.5);
                box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 
                            0 0 50px rgba(217, 150, 108, 0.2);
            }
        }

        /* 📱 MOBILE সাইজ */
        @media (max-width: 480px) {
            body {
                padding: 0;
                align-items: flex-start;
                background-image: radial-gradient(circle at 50% 15%, rgba(217, 150, 108, 0.3), transparent 60%);
            }
            .container {
                max-width: 100%;
                min-height: 100vh;
                border-radius: 0;
                padding: 65px 24px 40px 24px;
                background: transparent;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                border: none;
                box-shadow: none;
            }
        }

        /* ✨ চোখ ধাঁধানো ডাবল-লেয়ার্ড গ্লোয়িং আইকন কন্টেইনার */
        .premium-avatar-wrapper {
            position: relative;
            width: 115px;
            height: 115px;
            margin: 0 auto 25px;
            animation: floatAnim 4s ease-in-out infinite;
        }

        .premium-avatar {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #131c2e, #050811);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6);
        }

        /* কন্টিনিউয়াস নিয়ন স্পিন বর্ডার ইফেক্ট */
        .premium-avatar-wrapper::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            background: linear-gradient(0deg, transparent, transparent, var(--accent-copper), var(--accent-gold));
            z-index: -1;
            animation: rotateGlow 3s linear infinite;
        }

        /* আইকনের পেছনের হালকা কপার শ্যাডো গ্লো */
        .premium-avatar-wrapper::after {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            background: linear-gradient(0deg, transparent, transparent, var(--accent-copper), var(--accent-gold));
            z-index: -1;
            filter: blur(15px);
            animation: rotateGlow 3s linear infinite;
            opacity: 0.6;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* প্রিমিয়াম গোল্ডেন গ্রেডিয়েন্ট আইকন */
        .premium-avatar i {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #ffffff, var(--accent-gold), var(--accent-copper));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* ওপর-নিচে স্মুথ দুলার অ্যানিমেশন */
        @keyframes floatAnim {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        h1 span {
            background: linear-gradient(135deg, var(--accent-copper), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 📋 ২ লাইনে লক করা প্রিমিয়াম বায়ো টেক্সট */
        .bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 400;
            padding: 0 15px;
            max-width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* টেক্সট সর্বোচ্চ ২ লাইনে দেখাবে */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* লিংক কন্টেইনার */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 19px 26px;
            border-radius: 22px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            background: rgba(22, 32, 54, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            
            opacity: 0;
            transform: translateY(25px);
            animation: linkReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .social-link:nth-child(1) { animation-delay: 0.2s; }
        .social-link:nth-child(2) { animation-delay: 0.3s; }
        .social-link:nth-child(3) { animation-delay: 0.4s; }
        .social-link:nth-child(4) { animation-delay: 0.5s; }

        @keyframes linkReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 18px;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
        }

        .social-link i:not(.arrow-icon) {
            font-size: 1.6rem;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .arrow-icon {
            font-size: 0.85rem !important;
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        /* 💫 হোভার ও টাচ রেসপন্স */
        .social-link:hover, .social-link:active {
            transform: translateY(-5px) scale(1.025);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .social-link:hover i:not(.arrow-icon) {
            transform: scale(1.25);
        }

        .social-link:hover .arrow-icon {
            transform: translateX(6px);
            opacity: 1;
        }

        /* ব্র্যান্ডের নিয়ন গ্লো শ্যাডো */
        .whatsapp:hover { box-shadow: 0 12px 25px rgba(37, 211, 102, 0.3); border-color: #25d366; background: rgba(37, 211, 102, 0.08); }
        .facebook:hover { box-shadow: 0 12px 25px rgba(24, 119, 242, 0.3); border-color: #1877f2; background: rgba(24, 119, 242, 0.08); }
        .instagram:hover { box-shadow: 0 12px 25px rgba(225, 48, 108, 0.3); border-color: #e1306c; background: rgba(225, 48, 108, 0.08); }
        .tiktok:hover { box-shadow: 0 12px 25px rgba(255, 255, 255, 0.2); border-color: #ffffff; background: rgba(255, 255, 255, 0.08); }

        .footer {
            margin-top: 60px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Space Grotesk', sans-serif;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ✨ নতুন ডিজাইনড ডাবল-লেয়ার্ড গ্লোয়িং আইকন -->

    </div>

</body>
</html>
