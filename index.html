<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asadul Islam Hasan | Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* ব্যাকগ্রাউন্ড পুরোপুরি কালো এবং তার ওপরে আপনার PNG ছবি */
            background-color: #000000; 
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* Main Layout - পিসি ও মোবাইলের ঠিক মাঝামাঝি লক করা */
        .main-layout {
            width: 100%;
            max-width: 385px; 
            padding: 20px 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1;
            margin-top: -20px; 
        }

        /* প্রোফাইল ইমেজের অনবরত ভাসমান অ্যানিমেশন */
        @keyframes floatImage {
            0% { transform: translateY(0); box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); border-color: #00f2fe; }
            50% { transform: translateY(-8px); box-shadow: 0 0 35px rgba(0, 242, 254, 0.4); border-color: #ff007f; }
            100% { transform: translateY(0); box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); border-color: #00f2fe; }
        }

        /* নিচ থেকে ওপরে ওঠার দ্রুত এন্ট্রি অ্যানিমেশন */
        @keyframes slideUpFast {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* প্রোফাইল পিকচার */
        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px auto;
            border: 3.5px solid #00f2fe;
            animation: floatImage 4s infinite ease-in-out, slideUpFast 0.5s ease-out;
            display: block;
        }

        /* টাইপিং টেক্সটের জন্য ফিক্সড হাইট কন্টেইনার */
        .text-container {
            height: 95px; 
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 700;
            height: 38px; 
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
        }
        
        .bio { 
            color: #e2e8f0; 
            font-size: 0.92rem; 
            line-height: 1.45;
            height: 53px; 
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        /* টাইপিং কার্সার ব্লিংকিং */
        .typed-cursor {
            font-weight: bold;
            color: #00f2fe;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .links-container { display: flex; flex-direction: column; gap: 14px; }

        /* বাটনগুলোর প্রিমিয়াম স্টাইল */
        .link-btn {
            padding: 15px;
            color: white;
            font-weight: 600;
            border-radius: 16px;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            text-decoration: none; 
            position: relative;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6);
            opacity: 0;
            animation: slideUpFast 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        /* বাটন এন্ট্রি টাইমিং */
        .btn-1 { animation-delay: 0.35s; }
        .btn-2 { animation-delay: 0.48s; }
        .btn-3 { animation-delay: 0.61s; }
        .btn-4 { animation-delay: 0.74s; }
        .btn-5 { animation-delay: 0.87s; } 

        .link-btn.clicked {
            transform: scale(0.93);
            filter: brightness(1.3);
        }

        /* Premium Gradients */
        .whatsapp { background: linear-gradient(45deg, #11998e, #25D366, #38ef7d); }
        .facebook { background: linear-gradient(45deg, #00c6ff, #1877F2, #0072ff); }
        .instagram { background: linear-gradient(45deg, #fdbb2d, #dc2743, #bc1888); }
        .tiktok { background: linear-gradient(45deg, #ff007f, #000000, #00f2fe); }
        .phone-call { background: linear-gradient(45deg, #FF416C, #FF4B2B); } 
        
        .footer { 
            margin-top: 25px; 
            font-size: 0.75rem; 
            color: #cbd5e1; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            opacity: 0;
            animation: slideUpFast 0.5s ease-out 1.0s forwards;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <!-- প্রোফাইল পিকচার -->
        <img src="profile.png" alt="Profile" class="profile-img" onerror="this.src='https://via.placeholder.com/150'">
        
        <!-- ফিক্সড টেক্সট কন্টেইনার -->
        <div class="text-container">
            <h1><span id="type-name"></span><span id="cursor-name" class="typed-cursor">|</span></h1>
            <p class="bio"><span id="type-bio"></span><span id="cursor-bio" class="typed-cursor" style="display:none;">|</span></p>
        </div>

        <!-- সোশ্যাল ও কল বাটনসমূহ -->
        <div class="links-container">
            <div onclick="tapLink('https://wa.me/8801917757634', this)" class="link-btn whatsapp btn-1"><i class="fab fa-whatsapp"></i> WhatsApp</div>
            <div onclick="tapLink('https://www.facebook.com/profile.php?id=100000422314350', this)" class="link-btn facebook btn-2"><i class="fab fa-facebook-f"></i> Facebook</div>
            <div onclick="tapLink('https://www.instagram.com/asadulislamhasan143', this)" class="link-btn instagram btn-3"><i class="fab fa-instagram"></i> Instagram</div>
            <div onclick="tapLink('https://www.tiktok.com/@asadulislamhasan143', this)" class="link-btn tiktok btn-4"><i class="fab fa-tiktok"></i> TikTok</div>
            <a href="tel:+8801917757634" onclick="clickAnimation(this)" class="link-btn phone-call btn-5"><i class="fas fa-phone-alt"></i> Call Me</a>
        </div>

        <div class="footer">
            <p>⚡ Tap to Connect ⚡</p>
        </div>
    </div>

    <!-- টাইপিং অ্যানিমেশন স্ক্রিপ্ট -->
    <script>
        const nameText = "Asadul Islam Hasan";
        const bioText = "Living a simple life with extraordinary dreams.\nWelcome to my digital space.";

        function initPage() {
            startTyping();
        }

        function startTyping() {
            let nameIndex = 0;
            let bioIndex = 0;
            const nameTarget = document.getElementById("type-name");
            const bioTarget = document.getElementById("type-bio");
            const nameCursor = document.getElementById("cursor-name");
            const bioCursor = document.getElementById("cursor-bio");

            function typeName() {
                if (nameIndex < nameText.length) {
                    nameTarget.innerHTML += nameText.charAt(nameIndex);
                    nameIndex++;
                    setTimeout(typeName, 45);
                } else {
                    nameCursor.style.display = "none";
                    bioCursor.style.display = "inline";
                    typeBio();
                }
            }

            function typeBio() {
                if (bioIndex < bioText.length) {
                    if (bioText.charAt(bioIndex) === '\n') {
                        bioTarget.innerHTML += '<br>';
                    } else {
                        bioTarget.innerHTML += bioText.charAt(bioIndex);
                    }
                    bioIndex++;
                    setTimeout(typeBio, 25);
                } else {
                    bioCursor.style.display = "none";
                }
            }

            typeName();
        }

        document.addEventListener("DOMContentLoaded", initPage);

        function tapLink(url, element) {
            element.classList.add('clicked');
            setTimeout(function() {
                window.open(url, '_blank');
                element.classList.remove('clicked');
            }, 300); 
        }

        function clickAnimation(element) {
            element.classList.add('clicked');
            setTimeout(function() {
                element.classList.remove('clicked');
            }, 300);
        }
    </script>

</body>
</html>
