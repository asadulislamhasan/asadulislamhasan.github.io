<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asadul Islam Hasan | Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #04060d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* ১. পুরো স্ক্রিন জুড়ে ঘন ও এলোমেলো ব্যাকগ্রাউন্ড গ্রিড */
        .bg-matrix {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 12px 24px; /* শব্দের মাঝের দূরত্ব */
            padding: 20px;
            opacity: 0.05; /* হালকা কিন্তু স্পষ্ট */
            transform: rotate(-12deg); /* আকর্ষণীয় বাঁকা লুক */
            pointer-events: none;
            user-select: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-word {
            font-size: 10px; /* ছোট ও প্রিমিয়াম সাইজ */
            font-weight: 900;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main Layout Structure */
        .main-layout {
            width: 100%;
            max-width: 380px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1;
        }

        /* প্রোফাইল ইমেজের অনবরত ভাসমান অ্যানিমেশন */
        @keyframes floatImage {
            0% { transform: translateY(0); box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); border-color: #00f2fe; }
            50% { transform: translateY(-6px); box-shadow: 0 0 35px rgba(0, 242, 254, 0.4); border-color: #ff007f; }
            100% { transform: translateY(0); box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); border-color: #00f2fe; }
        }

        /* নিচ থেকে ওপরে ওঠার দ্রুত অ্যানিমেশন */
        @keyframes slideUpFast {
            from { opacity: 0; transform: translateY(35px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 18px auto;
            border: 3px solid #00f2fe;
            animation: floatImage 4s infinite ease-in-out, slideUpFast 0.5s ease-out;
            display: block;
        }

        /* টাইপিং টেক্সট স্টাইল */
        h1 {
            font-size: 1.65rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            color: #ffffff;
            display: inline-block;
            width: 100%;
        }
        
        .bio { 
            color: #e2e8f0; 
            font-size: 0.9rem; 
            line-height: 1.4;
            margin-bottom: 28px; 
            font-weight: 400;
            display: inline-block;
            width: 100%;
        }

        /* টাইপিং কার্সার ব্লিংকিং */
        .typed-cursor {
            font-weight: bold;
            color: #00f2fe;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .links-container { display: flex; flex-direction: column; gap: 15px; }

        /* বাটনগুলোর দ্রুত এন্ট্রি অ্যানিমেশন */
        .link-btn {
            padding: 15px;
            color: white;
            font-weight: 600;
            border-radius: 16px;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            opacity: 0;
            animation: slideUpFast 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        /* বাটন এন্ট্রি টাইমিং */
        .btn-1 { animation-delay: 0.4s; }
        .btn-2 { animation-delay: 0.55s; }
        .btn-3 { animation-delay: 0.7s; }
        .btn-4 { animation-delay: 0.85s; }

        .link-btn.clicked {
            transform: scale(0.93);
            filter: brightness(1.3);
        }

        /* Gradients */
        .whatsapp { background: linear-gradient(45deg, #11998e, #25D366, #38ef7d); }
        .facebook { background: linear-gradient(45deg, #00c6ff, #1877F2, #0072ff); }
        .instagram { background: linear-gradient(45deg, #fdbb2d, #dc2743, #bc1888); }
        .tiktok { background: linear-gradient(45deg, #ff007f, #000000, #00f2fe); }
        
        .footer { 
            margin-top: 30px; 
            font-size: 0.75rem; 
            color: #64748b; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            opacity: 0;
            animation: slideUpFast 0.5s ease-out 1.0s forwards;
        }
    </style>
</head>
<body>

    <div class="bg-matrix" id="matrix"></div>

    <div class="main-layout">
        <img src="profile.png" alt="Profile" class="profile-img" onerror="this.src='https://via.placeholder.com/150'">
        
        <h1><span id="type-name"></span><span id="cursor-name" class="typed-cursor">|</span></h1>
        <p class="bio"><span id="type-bio"></span><span id="cursor-bio" class="typed-cursor" style="display:none;">|</span></p>

        <div class="links-container">
            <div onclick="tapLink('https://wa.me/8801917757634', this)" class="link-btn whatsapp btn-1"><i class="fab fa-whatsapp"></i> WhatsApp</div>
            <div onclick="tapLink('https://www.facebook.com/profile.php?id=100000422314350', this)" class="link-btn facebook btn-2"><i class="fab fa-facebook-f"></i> Facebook</div>
            <div onclick="tapLink('https://www.instagram.com/asadulislamhasan143', this)" class="link-btn instagram btn-3"><i class="fab fa-instagram"></i> Instagram</div>
            <div onclick="tapLink('https://www.tiktok.com/@asadulislamhasan143', this)" class="link-btn tiktok btn-4"><i class="fab fa-tiktok"></i> TikTok</div>
        </div>

        <div class="footer">
            <p>⚡ Tap to Connect ⚡</p>
        </div>
    </div>

    <script>
        const nameText = "Asadul Islam Hasan";
        const bioText = "Living a simple life with extraordinary dreams.\nWelcome to my digital space.";
        
        // ব্যাকগ্রাউন্ডের জন্য শব্দের তালিকা
        const wordsArray = ["HASAN", "NFC", "CONNECT", "DIGITAL", "SOCIAL", "LINK", "TAP", "WAVE", "SHARE", "PROFILE"];

        function initPage() {
            // ১. ব্যাকগ্রাউন্ডে পুরো স্ক্রিন জুড়ে ঘন করে শব্দ বসানোর লুপ
            const matrix = document.getElementById("matrix");
            const totalWordsNeeded = 350; // পুরো স্ক্রিন কাভার করার জন্য যথেষ্ট শব্দ
            
            let matrixHTML = "";
            for (let i = 0; i < totalWordsNeeded; i++) {
                // র্যান্ডমলি শব্দ সিলেক্ট করা
                const randomWord = wordsArray[Math.floor(Math.random() * wordsArray.length)];
                matrixHTML += `<span class="bg-word">${randomWord}</span>`;
            }
            matrix.innerHTML = matrixHTML;

            // ২. টাইপিং অ্যানিমেশন শুরু
            startTyping();
        }

        function startTyping() {
            let nameIndex = 0;
            let bioIndex = 0;
            const nameTarget = document.getElementById("type-name");
            const bioTarget = document.getElementById("type-bio");
            const nameCursor = document.getElementById("cursor-name");
            const bioCursor = document.getElementById("cursor-bio");

            function typeName() {
                if (nameIndex < nameText.length) {
                    nameTarget.innerHTML += nameText.charAt(nameIndex);
                    nameIndex++;
                    setTimeout(typeName, 50);
                } else {
                    nameCursor.style.display = "none";
                    bioCursor.style.display = "inline";
                    typeBio();
                }
            }

            function typeBio() {
                if (bioIndex < bioText.length) {
                    if (bioText.charAt(bioIndex) === '\n') {
                        bioTarget.innerHTML += '<br>';
                    } else {
                        bioTarget.innerHTML += bioText.charAt(bioIndex);
                    }
                    bioIndex++;
                    setTimeout(typeBio, 30);
                } else {
                    bioCursor.style.display = "none";
                }
            }

            typeName();
        }

        // পেজ লোড সম্পন্ন হওয়ার সাথে সাথে সব রান হবে
        document.addEventListener("DOMContentLoaded", initPage);

        function tapLink(url, element) {
            element.classList.add('clicked');
            setTimeout(function() {
                window.open(url, '_blank');
                element.classList.remove('clicked');
            }, 300); 
        }
    </script>

</body>
</html>
