<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asadul Islam Hasan | Digital Card</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #090d16;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-glow: #c78b60;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 15%, rgba(199, 139, 96, 0.15), transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* PC এবং MOBILE এর জন্য ইন্টেলিজেন্ট কন্টেইনার */
        .container {
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* PC সাইজ (বড় স্ক্রিন) */
        @media (min-width: 481px) {
            .container {
                max-width: 480px;
                border-radius: 30px;
                padding: 45px 30px;
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(199, 139, 96, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .container:hover {
                transform: translateY(-8px);
                border-color: rgba(199, 139, 96, 0.3);
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 50px rgba(199, 139, 96, 0.1);
            }
        }

        /* MOBILE সাইজ (ফুল স্ক্রিন অ্যাপ লুক) */
        @media (max-width: 480px) {
            body {
                padding: 0;
                align-items: flex-start;
                background-image: radial-gradient(circle at 50% 10%, rgba(199, 139, 96, 0.2), transparent 60%);
            }
            .container {
                max-width: 100%;
                min-height: 100vh;
                border-radius: 0px;
                padding: 50px 24px 40px 24px;
                background: transparent;
                box-shadow: none;
                border: none;
            }
        }

        /* সিএসএস দিয়ে তৈরি সুন্দর এনিমেটেড আইকন */
        .icon-avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 50%;
            border: 3px solid var(--accent-glow);
            box-shadow: 0 0 20px rgba(199, 139, 96, 0.2);
            animation: pulseGlow 30px infinite alternate;
        }

        .icon-avatar-wrapper i {
            font-size: 3.5rem;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(199, 139, 96, 0.5);
        }

        /* আইকনের মৃদু পালস অ্যানিমেশন ইফেক্ট */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 15px rgba(199, 139, 96, 0.2);
                transform: scale(1);
            }
            100% {
                box-shadow: 0 0 30px rgba(199, 139, 96, 0.5);
                transform: scale(1.03);
            }
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        h1 span {
            color: var(--accent-glow);
            text-shadow: 0 0 15px rgba(199, 139, 96, 0.3);
        }

        /* সাধারণ মানুষের মতো সুন্দর ২ লাইনের ইংরেজি বায়ো */
        .bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 400;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* লিংক কন্টেইনার */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 26px;
            border-radius: 16px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .social-link i {
            font-size: 1.5rem;
        }

        .arrow-icon {
            font-size: 0.85rem !important;
            opacity: 0.4;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* হোভার এবং টাচ গ্লো ইফেক্ট */
        .whatsapp:hover, .whatsapp:active {
            border-color: #25d366;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.2);
            background: rgba(37, 211, 102, 0.1);
        }
        .facebook:hover, .facebook:active {
            border-color: #1877f2;
            box-shadow: 0 0 20px rgba(24, 119, 242, 0.2);
            background: rgba(24, 119, 242, 0.1);
        }
        .instagram:hover, .instagram:active {
            border-color: #e1306c;
            box-shadow: 0 0 20px rgba(225, 48, 108, 0.2);
            background: rgba(225, 48, 108, 0.1);
        }
        .tiktok:hover, .tiktok:active {
            border-color: #ff0050;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.2);
            background: rgba(255, 0, 80, 0.1);
        }

        .social-link:hover .arrow-icon {
            transform: translateX(5px);
            opacity: 1;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ছবির বদলে কোড দিয়ে তৈরি প্রিমিয়াম এনিমেটেড আইকন -->
        <div class="icon-avatar-wrapper">
            <i class="fas fa-user-astronaut"></i>
        </div>

        <!-- নাম -->
        <h1>Asadul Islam <span>Hasan</span></h1>

        <!-- সাধারণ মানুষের মতো সহজ সরল ইংরেজি বায়ো -->
        <div class="bio">
            Just a simple person who loves to live life cheerfully and values true connections. <br>
            Feel free to reach out and connect with me through my profiles below!
        </div>

        <!-- সোশ্যাল লিঙ্কসমূহ -->
        <div class="links-wrapper">
            
            <!-- WhatsApp -->
            <a href="https://wa.me/8801917757634" target="_blank" class="social-link whatsapp">
                <div class="link-content">
                    <i class="fab fa-whatsapp" style="color: #25d366;"></i>
                    <span>WhatsApp</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/profile.php?id=100000422314350" target="_blank" class="social-link facebook">
                <div class="link-content">
                    <i class="fab fa-facebook-f" style="color: #1877f2;"></i>
                    <span>Facebook</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/asadulislamhasan143" target="_blank" class="social-link instagram">
                <div class="link-content">
                    <i class="fab fa-instagram" style="color: #e1306c;"></i>
                    <span>Instagram</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <!-- Tiktok -->
            <a href="https://www.tiktok.com/@asadulislamhasan143" target="_blank" class="social-link tiktok">
                <div class="link-content">
                    <i class="fab fa-tiktok" style="color: #ffffff;"></i>
                    <span>TikTok</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

        </div>

        <!-- ফুটার -->
        <div class="footer">
            © 2026 ASADUL ISLAM HASAN
        </div>
    </div>

</body>
</html>
